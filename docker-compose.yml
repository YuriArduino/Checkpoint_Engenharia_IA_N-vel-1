networks:
  ia-mesh:
    driver: bridge

volumes:
  database_data: # Volume compartilhado para manter os arquivos .db do SQLite persistentes

services:
  # ============================================================================
  # SERVIÇO CONSTRUTOR: BFA (Faz o build da imagem base e roda o bfa_service)
  # ============================================================================
  bfa-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: checkpoint_ia_base_image:latest # Define o nome da imagem base para os outros
    container_name: bfa_service_hub
    ports:
      - "8081:8001"
    volumes:
      - .:/app
      - database_data:/app/shared_db
    env_file:
      - .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    command: python bfa_service/app.py
    networks:
      - ia-mesh

  # ============================================================================
  # SERVIÇOS QUE REUTILIZAM A IMAGEM BASE
  # ============================================================================
  agent-orchestrator:
    image: checkpoint_ia_base_image:latest # REUTILIZA A IMAGEM
    depends_on:
      - bfa-service # Garante que o BFA construa a imagem antes de subir
    container_name: agent_orchestrator_supervisor
    ports:
      - "8080:8000"
    volumes:
      - .:/app
      - database_data:/app/shared_db
    env_file:
      - .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - DATABASE_URL=sqlite:////app/shared_db/mvp_database.db
      - MODERATION_CHECKPOINT_DB=/app/shared_db/moderation_checkpoints.db
      - BFA_SERVICE_URL=bfa-service:8001
      - ANALYST_AGENT_URL=http://analyst-agent:5001
      - ANALYST_AGENT_HOST=analyst-agent
      - AUDITOR_AGENT_HOST=auditor-agent
      - MODERATOR_AGENT_HOST=moderator-agent
    working_dir: /app/agent-orchestrator
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ia-mesh

  analyst-agent:
    image: checkpoint_ia_base_image:latest # REUTILIZA A IMAGEM
    depends_on:
      - bfa-service
    container_name: analyst_agent_grpc
    ports:
      - "5001:5001"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    command: python agents/analyst/server.py
    networks:
      - ia-mesh

  auditor-agent:
    image: checkpoint_ia_base_image:latest # REUTILIZA A IMAGEM
    depends_on:
      - bfa-service
    container_name: auditor_agent_grpc
    ports:
      - "5002:5002"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    command: python agents/auditor/server.py
    networks:
      - ia-mesh

  moderator-agent:
    image: checkpoint_ia_base_image:latest # REUTILIZA A IMAGEM
    depends_on:
      - bfa-service
    container_name: moderator_agent_grpc
    ports:
      - "5003:5003"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    command: python agents/moderator/server.py
    networks:
      - ia-mesh

  # ============================================================================
  # FRONTEND (Sem alterações)
  # ============================================================================
  frontend:
    profiles:
      - frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_ag_ui_react
    depends_on:
      - agent-orchestrator
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - CHOKIDAR_INTERVAL=1000
      - FAST_REFRESH=true
      - REACT_APP_ORCHESTRATOR_URL=http://localhost:8080
    command: npm start
    networks:
      - ia-mesh
